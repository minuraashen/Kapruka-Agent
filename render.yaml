# Render.com blueprint — free, no credit card required.
# Deploy: push to GitHub → render.com → New → Blueprint → pick this repo.
# Then set LLM_API_KEY in the dashboard (it's marked sync:false so it isn't
# committed). A free uptime pinger (UptimeRobot) hitting /api/health keeps the
# free instance warm so judges never hit a cold start.
services:
  - type: web
    name: kiki-kapruka
    runtime: node
    plan: free
    rootDir: app
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: LLM_BASE_URL
        value: https://openrouter.ai/api/v1
      # Free-model fallback chain — first one that isn't rate-limited answers.
      - key: LLM_MODEL
        value: openai/gpt-oss-120b:free,openai/gpt-oss-20b:free,openrouter/free
      # Set this in the Render dashboard (Environment tab) — never commit it.
      - key: LLM_API_KEY
        sync: false
